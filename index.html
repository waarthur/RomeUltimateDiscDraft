<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Event Test</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #111; color: #eee; }
  input { width: 100%; padding: 10px; margin: 6px 0 14px; background: #222; border: 1px solid #444; color: #eee; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
  button { background: #c8f135; color: #111; border: none; padding: 12px 28px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin: 6px 4px; }
  button:hover { opacity: 0.85; }
  label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  #log { background: #000; border: 1px solid #333; border-radius: 6px; padding: 14px; margin-top: 20px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; min-height: 100px; color: #0f0; }
  .err { color: #f55; }
  .ok  { color: #5f5; }
  .inf { color: #55f; }
  h2 { color: #c8f135; }
</style>
</head>
<body>

<h2>Create Event - Isolated Test</h2>
<p style="color:#aaa;font-size:.85rem">Paste your Supabase credentials and try creating an event. All steps are logged below.</p>

<label>Supabase URL</label>
<input type="text" id="t-url" placeholder="https://xxxx.supabase.co">

<label>Supabase Anon Key</label>
<input type="text" id="t-key" placeholder="eyJ...">

<label>Event Name</label>
<input type="text" id="t-name" placeholder="Summer Pickup">

<button type="button" onclick="runTest()">Test Create Event</button>
<button type="button" onclick="testConnection()">Test Connection Only</button>
<button type="button" onclick="document.getElementById('log').textContent=''">Clear Log</button>

<div id="log">Waiting for test...</div>

<script type="text/javascript">
function log(msg, cls) {
  var el = document.getElementById('log');
  var line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = new Date().toLocaleTimeString() + ' -- ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function testConnection() {
  var url = document.getElementById('t-url').value.trim().replace(/\/+$/, '');
  var key = document.getElementById('t-key').value.trim();
  log('Testing connection...', 'inf');
  if (!url || !key) { log('ERROR: URL and key are required', 'err'); return; }
  fetch(url + '/rest/v1/events?limit=1', {
    headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
  })
  .then(function(r) {
    log('HTTP status: ' + r.status, r.ok ? 'ok' : 'err');
    return r.text();
  })
  .then(function(body) {
    log('Response: ' + body, 'ok');
  })
  .catch(function(err) {
    log('Fetch error: ' + err.message, 'err');
  });
}

function runTest() {
  log('--- Starting create event test ---', 'inf');

  var url = document.getElementById('t-url').value.trim().replace(/\/+$/, '');
  var key = document.getElementById('t-key').value.trim();
  var name = document.getElementById('t-name').value.trim();

  log('URL: ' + (url || '(empty)'));
  log('Key: ' + (key ? key.substring(0, 20) + '...' : '(empty)'));
  log('Name: ' + (name || '(empty)'));

  if (!url) { log('STOPPED: URL is empty', 'err'); return; }
  if (!key) { log('STOPPED: Key is empty', 'err'); return; }
  if (!name) { log('STOPPED: Event name is empty', 'err'); return; }

  log('All fields present. Sending POST to Supabase...', 'inf');

  var body = JSON.stringify({ name: name });
  log('Body: ' + body);

  fetch(url + '/rest/v1/events', {
    method: 'POST',
    headers: {
      'apikey': key,
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: body
  })
  .then(function(resp) {
    log('HTTP status: ' + resp.status + ' ' + resp.statusText, resp.ok ? 'ok' : 'err');
    return resp.text();
  })
  .then(function(text) {
    log('Response body: ' + text, 'ok');
    log('--- Test complete ---', 'ok');
  })
  .catch(function(err) {
    log('FETCH ERROR: ' + err.message, 'err');
    log('This usually means CORS is blocking the request, or the URL is wrong.', 'err');
  });
}
</script>
</body>
</html>
